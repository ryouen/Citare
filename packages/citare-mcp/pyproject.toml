[project]
name = "citare-mcp"
version = "0.1.0"
description = "Citare MCP server: search_claims, cite_claim, get_claim_graph"
requires-python = ">=3.10"
dependencies = [
    "citare-core",
    "citare-db",
    "mcp>=1.0",
]

[project.scripts]
citare-mcp = "citare_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/citare_mcp"]
