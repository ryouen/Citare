[project]
name = "citare-core"
version = "0.1.0"
description = "Citare core: pydantic schemas for academic-claim knowledge graph"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/citare_core"]
